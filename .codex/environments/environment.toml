# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "ai-town"

[setup]
script = '''
set -euo pipefail

convex_cli() {
  npx -y convex@latest "$@"
}

if [ -f package-lock.json ]; then
  npm ci
else
  npm install
fi

SOURCE_REPO_PATH="${CODEX_SOURCE_REPO_PATH:-/Users/nick/Documents/New project 3/ai-town}"
SOURCE_ENV_LOCAL="${CODEX_SOURCE_ENV_LOCAL:-$SOURCE_REPO_PATH/.env.local}"
SOURCE_ENV_FILE="${CODEX_SOURCE_ENV_FILE:-$SOURCE_REPO_PATH/.env}"
CONVEX_ENV_FILE="$(mktemp)"
WORKTREE_PARENT="$(basename "$(dirname "${CODEX_WORKTREE_PATH:-$PWD}")")"
WORKTREE_NAME="${CODEX_WORKTREE_NAME:-$WORKTREE_PARENT}"
WORKTREE_SLUG="$(printf '%s' "$WORKTREE_NAME" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9._/-' '-' | sed 's/^-//; s/-$//' | cut -c1-48)"
WORKTREE_USER="${USER:-$(whoami)}"
WORKTREE_PORT="${CODEX_WORKTREE_PORT:-}"
CONVEX_DEPLOYMENT_REF="${CODEX_CONVEX_DEPLOYMENT_REF:-dev/$WORKTREE_USER-codex/$WORKTREE_SLUG}"
CONVEX_DEPLOYMENT_EXPIRATION="${CODEX_CONVEX_DEPLOYMENT_EXPIRATION:-in 1 day}"
WORKTREE_STATE_FILE=".env.codex-worktree"

cleanup() {
  rm -f "$CONVEX_ENV_FILE"
}
trap cleanup EXIT

if [ -z "$WORKTREE_PORT" ]; then
  PORT_OFFSET="$(printf '%s' "$WORKTREE_NAME" | cksum | awk '{ print $1 % 4000 }')"
  WORKTREE_PORT="$((5200 + PORT_OFFSET))"
fi

is_port_available() {
  node -e '
    const net = require("node:net");
    const port = Number(process.argv[1]);
    const server = net.createServer();
    server.once("error", () => process.exit(1));
    server.once("listening", () => server.close(() => process.exit(0)));
    server.listen(port, "127.0.0.1");
  ' "$1"
}

if [ -z "${CODEX_WORKTREE_PORT:-}" ]; then
  PORT_FOUND=0
  for offset in $(seq 0 99); do
    CANDIDATE_PORT="$((WORKTREE_PORT + offset))"
    if is_port_available "$CANDIDATE_PORT"; then
      WORKTREE_PORT="$CANDIDATE_PORT"
      PORT_FOUND=1
      break
    fi
  done

  if [ "$PORT_FOUND" != "1" ]; then
    echo "Unable to find an available ai-town worktree port near $WORKTREE_PORT." >&2
    exit 1
  fi
fi

set_env_value() {
  local file="$1"
  local key="$2"
  local value="$3"

  if [ -f "$file" ] && grep -qE "^${key}=" "$file"; then
    KEY="$key" VALUE="$value" perl -0pi -e '
      my $key = $ENV{KEY};
      my $value = $ENV{VALUE};
      s/^\Q$key\E=.*/$key=$value/m;
    ' "$file"
  else
    printf '\n%s=%s\n' "$key" "$value" >> "$file"
  fi
}

rewrite_localhost_port() {
  local file="$1"
  [ -f "$file" ] || return 0
  perl -0pi -e 's/(localhost|127\.0\.0\.1):5173/$1:'"$WORKTREE_PORT"'/g' "$file"
}

copy_env_file() {
  local source_file="$1"
  local target_file="$2"

  if [ -f "$source_file" ]; then
    cp "$source_file" "$target_file"
    chmod 600 "$target_file"
    rewrite_localhost_port "$target_file"
    set_env_value "$target_file" PORT "$WORKTREE_PORT"
    set_env_value "$target_file" CODEX_WORKTREE_PORT "$WORKTREE_PORT"
  fi
}

copy_env_file "$SOURCE_ENV_FILE" .env
copy_env_file "$SOURCE_ENV_LOCAL" .env.local

if [ -f .env.local ]; then
  convex_cli env list > "$CONVEX_ENV_FILE"
else
  echo "Warning: source .env.local not found at $SOURCE_ENV_LOCAL; copying Convex env from the default dev deployment." >&2
  convex_cli env list --deployment "${CODEX_SOURCE_CONVEX_DEPLOYMENT:-dev}" > "$CONVEX_ENV_FILE"
fi

rewrite_localhost_port "$CONVEX_ENV_FILE"
set_env_value "$CONVEX_ENV_FILE" PORT "$WORKTREE_PORT"
set_env_value "$CONVEX_ENV_FILE" CODEX_WORKTREE_PORT "$WORKTREE_PORT"

convex_cli deployment create "$CONVEX_DEPLOYMENT_REF" --type dev --expiration "$CONVEX_DEPLOYMENT_EXPIRATION" --select
set_env_value .env.local PORT "$WORKTREE_PORT"
set_env_value .env.local CODEX_WORKTREE_PORT "$WORKTREE_PORT"

SELECTED_CONVEX_DEPLOYMENT="$(awk -F= '/^CONVEX_DEPLOYMENT=dev:/ { value=$2; sub(/^dev:/, "", value); sub(/[[:space:]]#.*/, "", value); print value; exit }' .env.local)"
{
  printf 'WORKTREE_NAME=%s\n' "$WORKTREE_NAME"
  printf 'WORKTREE_PORT=%s\n' "$WORKTREE_PORT"
  printf 'CONVEX_DEPLOYMENT_REF=%s\n' "$CONVEX_DEPLOYMENT_REF"
  printf 'CONVEX_DEPLOYMENT_NAME=%s\n' "$SELECTED_CONVEX_DEPLOYMENT"
} > "$WORKTREE_STATE_FILE"
chmod 600 "$WORKTREE_STATE_FILE"

if [ -s "$CONVEX_ENV_FILE" ]; then
  convex_cli env set --from-file "$CONVEX_ENV_FILE" --force
fi

convex_cli dev --once --typecheck=disable --codegen=disable --tail-logs=disable

echo "Configured ai-town worktree port $WORKTREE_PORT."
'''

[cleanup]
script = '''
set -u

WORKTREE_STATE_FILE=".env.codex-worktree"

if [ ! -f "$WORKTREE_STATE_FILE" ]; then
  echo "No ai-town Codex worktree state file found; skipping cleanup."
  exit 0
fi

CONVEX_DEPLOYMENT_REF="$(awk -F= '/^CONVEX_DEPLOYMENT_REF=/ { print $2; exit }' "$WORKTREE_STATE_FILE")"
CONVEX_DEPLOYMENT_NAME="$(awk -F= '/^CONVEX_DEPLOYMENT_NAME=/ { print $2; exit }' "$WORKTREE_STATE_FILE")"

case "$CONVEX_DEPLOYMENT_REF" in
  dev/*-codex/*) ;;
  *)
    echo "Refusing to delete non-Codex Convex deployment ref: $CONVEX_DEPLOYMENT_REF" >&2
    exit 0
    ;;
esac

if [ -n "$CONVEX_DEPLOYMENT_NAME" ]; then
  node - "$CONVEX_DEPLOYMENT_NAME" <<'NODE'
const fs = require("node:fs");
const os = require("node:os");
const path = require("node:path");

const deploymentName = process.argv[2];

function readCliAccessToken() {
  const configPath = path.join(os.homedir(), ".convex", "config.json");
  try {
    const config = JSON.parse(fs.readFileSync(configPath, "utf8"));
    return typeof config.accessToken === "string" && config.accessToken.length > 0
      ? config.accessToken
      : null;
  } catch {
    return null;
  }
}

async function main() {
  const token = process.env.CONVEX_MANAGEMENT_TOKEN
    ?? process.env.CONVEX_OVERRIDE_ACCESS_TOKEN
    ?? readCliAccessToken();

  if (!token) {
    console.warn("No Convex management token found; deployment will rely on its configured expiration.");
    return;
  }

  const response = await fetch(
    `https://api.convex.dev/v1/deployments/${encodeURIComponent(deploymentName)}/delete`,
    {
      method: "POST",
      headers: {
        Authorization: `Bearer ${token}`,
      },
    },
  );

  if (!response.ok) {
    const body = await response.text().catch(() => "");
    console.warn(`Unable to delete Convex deployment ${deploymentName}: ${response.status} ${body}`);
    return;
  }

  console.log(`Deleted Convex deployment ${deploymentName}.`);
}

main().catch((error) => {
  console.warn(`Unable to delete Convex deployment ${deploymentName}: ${error instanceof Error ? error.message : String(error)}`);
});
NODE
fi

rm -f "$WORKTREE_STATE_FILE" .env .env.local
'''
